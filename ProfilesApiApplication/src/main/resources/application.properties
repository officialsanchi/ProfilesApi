spring.application.name=ProfilesApiApplication

# Database Connection (Ensure these variables are set in Railway)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Config
# Fix: Use 'spring.jpa.properties.hibernate.dialect' for better reliability
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Critical fix for the 'bytea' error and connection startup
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false