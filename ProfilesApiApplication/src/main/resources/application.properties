spring.application.name=ProfilesApiApplication

# Core Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA Settings
spring.jpa.show-sql=true
# Use the newer PostgreSQL 10+ Dialect for better compatibility
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Important: Change to 'update' once the table is correctly created
spring.jpa.hibernate.ddl-auto=update

# Force Spring to treat all parameters as Strings to avoid bytea errors
spring.jpa.properties.hibernate.format_sql=true